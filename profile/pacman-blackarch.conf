
# ---- BlackArch repository (added by Arsenal build.sh) ----
# strap.sh installs the signing keys and the mirrorlist on the build host;
# this stanza points the build's pacman at that repo so mkarchiso can pull
# BlackArch tools into the image.
[blackarch]
SigLevel = Required DatabaseOptional
Include = /etc/pacman.d/blackarch-mirrorlist
