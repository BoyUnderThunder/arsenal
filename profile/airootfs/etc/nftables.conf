#!/usr/bin/nft -f
#
# Arsenal default-deny firewall.
# Inbound: dropped except loopback, established/related, and ICMP.
# Outbound: allowed (so the operator's tools can reach their targets).
# No listening services are exposed by default — uncomment a rule to open one.

flush ruleset

table inet filter {
    chain input {
        type filter hook input priority filter; policy drop;

        iif "lo" accept
        ct state established,related accept
        ct state invalid drop

        # Diagnostics: allow ping / ICMPv6 (ND is required for IPv6).
        ip protocol icmp accept
        meta l4proto ipv6-icmp accept

        # --- Optional listeners (closed by default) ---------------------
        # tcp dport 22 accept    ;# SSH
        # tcp dport 7474 accept  ;# Neo4j browser (BloodHound)

        # Be quiet rather than reply with rejects (smaller attack surface).
    }

    chain forward {
        type filter hook forward priority filter; policy drop;
    }

    chain output {
        type filter hook output priority filter; policy accept;
    }
}
