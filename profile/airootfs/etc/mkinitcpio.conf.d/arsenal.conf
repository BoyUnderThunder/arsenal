# Arsenal initramfs hooks.
#
# Extends the archiso live-boot hooks with the bits needed to boot from (or
# install onto) LUKS-encrypted volumes: `encrypt` (open LUKS) and `lvm2`.
# Keyboard/keymap/consolefont come before encrypt so you can type the
# passphrase. This makes the media "LUKS-ready" for persistent installs while
# still booting fine as a live ISO.
HOOKS=(base udev modconf kms keyboard keymap consolefont memdisk archiso archiso_loop_mnt archiso_pxe_common archiso_pxe_nbd archiso_pxe_http archiso_pxe_nfs block lvm2 encrypt filesystems)
