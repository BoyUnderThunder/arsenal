#
# Arsenal /etc/pacman.conf — for the booted live system.
# Includes [core], [extra], [multilib] and [blackarch].
#
[options]
HoldPkg     = pacman glibc
Architecture = auto
Color
CheckSpace
ParallelDownloads = 5
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist

[blackarch]
SigLevel = Required DatabaseOptional
Include = /etc/pacman.d/blackarch-mirrorlist
