# Arsenal platform configuration.
# System-wide defaults; per-user overrides may live in
# ~/.config/arsenal/arsenal.conf.

[arsenal]
version = rolling
# build_date is stamped by build.sh at ISO build time.
build_date =
channel = rolling

[ai]
# Default provider for `arsenal ai` (implemented in a later phase).
# Models are NOT bundled; install/run Ollama or set an API key separately.
provider = ollama
model = llama3
base_url = http://127.0.0.1:11434
# Environment variable that holds the API key for API-based providers:
api_key_env = ARSENAL_AI_KEY
