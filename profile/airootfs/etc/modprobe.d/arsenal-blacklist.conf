# Arsenal: disable rarely-used, historically vulnerable kernel modules.
# These reduce attack surface; remove a line if you actually need that module.

# Uncommon / legacy network protocols
install dccp /bin/false
install sctp /bin/false
install rds /bin/false
install tipc /bin/false

# Uncommon filesystems often abused in forensics-evasion / autorun attacks
install cramfs /bin/false
install freevxfs /bin/false
install jffs2 /bin/false
install hfs /bin/false
install hfsplus /bin/false
install udf /bin/false

# FireWire DMA can be used to read RAM over the bus
install firewire-core /bin/false
install thunderbolt /bin/false
