name: boot-test-arsenal

# Honest boot verification: download an already-built arsenal-iso artifact and
# boot it in QEMU using the corrected smoke test (which waits for a post-boot
# shell marker, not bootloader branding). Lets us verify boot without a rebuild.

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID that produced the arsenal-iso artifact"
        required: true
        default: "27883240346"

permissions:
  actions: read
  contents: read

jobs:
  boot:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache || true
          sudo mkdir -p /mnt/iso && sudo chmod 0777 /mnt/iso
          df -h /

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: arsenal-iso
          path: /mnt/iso
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ github.token }}

      - name: Install QEMU
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-system-x86

      - name: Inspect ISO boot configuration
        run: |
          ISO="$(find /mnt/iso -name '*.iso' | head -n1)"
          echo "ISO: ${ISO}"; ls -lh "${ISO}"
          echo "=== volume label ==="; sudo blkid -o value -s LABEL "${ISO}" || true
          sudo mkdir -p /mnt/cd && sudo mount -o loop,ro "${ISO}" /mnt/cd
          echo "=== syslinux: APPEND / console / vmlinuz lines ==="
          sudo grep -rhnE 'APPEND|console=|vmlinuz|archisolabel' /mnt/cd/arsenal/boot/syslinux/ 2>/dev/null | head -60 || true
          echo "=== grub: linux / console lines ==="
          sudo grep -rhnE 'linux .*vmlinuz|console=|archisolabel' /mnt/cd/arsenal/boot/grub/ 2>/dev/null | head -40 || true
          sudo umount /mnt/cd

      - name: Boot test (QEMU)
        run: |
          ISO="$(find /mnt/iso -name '*.iso' | head -n1)"
          echo "Testing: ${ISO}"; ls -lh "${ISO}"
          chmod +x tools/smoke-test.sh
          sudo --preserve-env=SMOKE_MEM tools/smoke-test.sh "${ISO}" 420
