name: release-arsenal

# Publishes a public GitHub Release with the Arsenal ISO. Because GitHub caps
# release assets at <2 GiB per file, the ~6.7 GB ISO is split into parts plus a
# sha256 of the whole image; users reassemble with `cat` and verify.
#
# Run it manually: Actions -> release-arsenal -> Run workflow, giving the build
# run that produced the arsenal-iso artifact and a tag (e.g. v2026.06.21).

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of the build that produced the arsenal-iso artifact"
        required: true
      tag:
        description: "Release tag (e.g. v2026.06.21)"
        required: true

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    # Signing is optional: it runs only when a project GPG key is configured as
    # the GPG_PRIVATE_KEY secret (with GPG_PASSPHRASE). Without it, releases are
    # published exactly as before — just unsigned.
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache || true
          sudo mkdir -p /mnt/rel && sudo chmod 0777 /mnt/rel
          df -h /

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: arsenal-iso
          path: /mnt/rel
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ github.token }}

      - name: Download provenance artifact (lockfile + SBOM)
        uses: actions/download-artifact@v4
        continue-on-error: true   # older builds may predate provenance
        with:
          name: arsenal-provenance
          path: /mnt/rel
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ github.token }}

      - name: Split ISO + checksum
        id: prep
        run: |
          cd /mnt/rel
          ISO="$(find . -maxdepth 1 -name '*.iso' | head -n1)"
          BASE="$(basename "${ISO}")"
          echo "ISO=${ISO}  BASE=${BASE}"; ls -lh "${ISO}"
          sha256sum "${BASE}" | tee "${BASE}.sha256"
          # GitHub release assets must be < 2 GiB; split into 1900 MB parts.
          split -b 1900M -d -a 2 "${BASE}" "${BASE}.part"
          rm -f "${BASE}"            # don't attempt to upload the >2 GiB whole file
          ls -lh "${BASE}".part* "${BASE}.sha256"
          # One checksum manifest over every published file (parts + provenance),
          # so a single (optionally signed) file verifies the whole release.
          sha256sum "${BASE}".part* > SHA256SUMS
          for f in *.lock *.cdx.json; do [[ -e "$f" ]] && sha256sum "$f" >> SHA256SUMS; done
          echo "---- SHA256SUMS ----"; cat SHA256SUMS
          {
            echo "base=${BASE}"
          } >> "${GITHUB_OUTPUT}"
          # Build release notes (4-space code blocks; no backticks to keep heredoc safe)
          cat > /mnt/rel/notes.md <<EOF
          **Arsenal** — a white-hat security live ISO (Arch + BlackArch).

          The ISO (~6.7 GB) is split into <2 GiB parts because of GitHub's per-file
          release limit. Download all \`${BASE}.part*\` files and the \`.sha256\`, then:

              cat ${BASE}.part?? > ${BASE}
              sha256sum -c ${BASE}.sha256

          Write it to a USB stick (BIOS or UEFI):

              sudo dd if=${BASE} of=/dev/sdX bs=4M status=progress oflag=sync

          (or use Ventoy / Rufus / balenaEtcher). On boot you get the dark Arsenal
          menu, autologin to a dark XFCE \`root@arsenal\` desktop. Run **arsenal** to
          see the armory (20 weapon aliases), or call a weapon directly
          (sniper, bazooka, tower, locksmith, poltergeist, ...).

          Hardened by default: linux-hardened kernel, AppArmor, default-deny nftables, LUKS-ready.
          Authorized testing only.

          ---
          Verify everything you downloaded (parts + provenance):

              sha256sum -c SHA256SUMS

          Supply-chain provenance is attached: the package lockfile
          (\`${BASE}.lock\`) and a CycloneDX SBOM (\`${BASE}.cdx.json\`). If
          \`SHA256SUMS.asc\` is present, the release is GPG-signed — verify with:

              gpg --verify SHA256SUMS.asc SHA256SUMS
          EOF

      - name: Sign release (GPG, optional)
        if: ${{ env.GPG_PRIVATE_KEY != '' }}
        run: |
          cd /mnt/rel
          BASE="${{ steps.prep.outputs.base }}"
          printf '%s' "${GPG_PRIVATE_KEY}" | gpg --batch --import
          KEYID="$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/{print $5; exit}')"
          echo "Signing with key ${KEYID}"
          sign() {
            gpg --batch --yes --pinentry-mode loopback --passphrase "${GPG_PASSPHRASE}" \
                --local-user "${KEYID}" --armor --detach-sign --output "$1.asc" "$1"
          }
          sign SHA256SUMS
          sign "${BASE}.sha256"
          ls -lh *.asc

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd /mnt/rel
          BASE="${{ steps.prep.outputs.base }}"
          TAG="${{ github.event.inputs.tag }}"
          # Always publish: parts + whole-ISO checksum + the SHA256SUMS manifest.
          ASSETS=( "${BASE}".part* "${BASE}.sha256" SHA256SUMS )
          # Optionally add provenance (if the build produced it) and signatures (if signed).
          for f in "${BASE}.lock" "${BASE}.cdx.json" SHA256SUMS.asc "${BASE}.sha256.asc"; do
            [[ -e "$f" ]] && ASSETS+=( "$f" )
          done
          echo "Release assets:"; printf '  %s\n' "${ASSETS[@]}"
          gh release create "${TAG}" "${ASSETS[@]}" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "Arsenal ${TAG}" \
            --notes-file notes.md
          echo "Release published:"
          gh release view "${TAG}" --repo "${{ github.repository }}" --json url --jq .url
