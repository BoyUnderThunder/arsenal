name: release-arsenal

# Publishes a public GitHub Release with the Arsenal ISO. Because GitHub caps
# release assets at <2 GiB per file, the ~6.7 GB ISO is split into parts plus a
# sha256 of the whole image; users reassemble with `cat` and verify.
#
# Run it manually: Actions -> release-arsenal -> Run workflow, giving the build
# run that produced the arsenal-iso artifact and a tag (e.g. v2026.06.21).

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: "Run ID of the build that produced the arsenal-iso artifact"
        required: true
      tag:
        description: "Release tag (e.g. v2026.06.21)"
        required: true

permissions:
  contents: write
  actions: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare disk
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android /opt/hostedtoolcache || true
          sudo mkdir -p /mnt/rel && sudo chmod 0777 /mnt/rel
          df -h /

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          name: arsenal-iso
          path: /mnt/rel
          run-id: ${{ github.event.inputs.run_id }}
          github-token: ${{ github.token }}

      - name: Split ISO + checksum
        id: prep
        run: |
          cd /mnt/rel
          ISO="$(find . -maxdepth 1 -name '*.iso' | head -n1)"
          BASE="$(basename "${ISO}")"
          echo "ISO=${ISO}  BASE=${BASE}"; ls -lh "${ISO}"
          sha256sum "${BASE}" | tee "${BASE}.sha256"
          # GitHub release assets must be < 2 GiB; split into 1900 MB parts.
          split -b 1900M -d -a 2 "${BASE}" "${BASE}.part"
          rm -f "${BASE}"            # don't attempt to upload the >2 GiB whole file
          ls -lh "${BASE}".part* "${BASE}.sha256"
          {
            echo "base=${BASE}"
          } >> "${GITHUB_OUTPUT}"
          # Build release notes (4-space code blocks; no backticks to keep heredoc safe)
          cat > /mnt/rel/notes.md <<EOF
          **Arsenal** — a white-hat security live ISO (Arch + BlackArch).

          The ISO (~6.7 GB) is split into <2 GiB parts because of GitHub's per-file
          release limit. Download all \`${BASE}.part*\` files and the \`.sha256\`, then:

              cat ${BASE}.part?? > ${BASE}
              sha256sum -c ${BASE}.sha256

          Write it to a USB stick (BIOS or UEFI):

              sudo dd if=${BASE} of=/dev/sdX bs=4M status=progress oflag=sync

          (or use Ventoy / Rufus / balenaEtcher). On boot you get the dark Arsenal
          menu, autologin to a dark XFCE \`root@arsenal\` desktop. Run **arsenal** to
          see the armory (20 weapon aliases), or call a weapon directly
          (sniper, bazooka, tower, locksmith, poltergeist, ...).

          Hardened by default: linux-hardened kernel, AppArmor, default-deny nftables, LUKS-ready.
          Authorized testing only.
          EOF

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cd /mnt/rel
          BASE="${{ steps.prep.outputs.base }}"
          gh release create "${{ github.event.inputs.tag }}" \
            "${BASE}".part* "${BASE}.sha256" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "Arsenal ${{ github.event.inputs.tag }}" \
            --notes-file notes.md
          echo "Release published:"
          gh release view "${{ github.event.inputs.tag }}" --repo "${{ github.repository }}" --json url --jq .url
